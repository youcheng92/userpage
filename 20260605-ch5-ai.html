<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP商品管理系統</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/my.css">

    <style>
        :root {
            --erp-primary: #1f2937;
            --erp-secondary: #374151;
            --erp-accent: #2563eb;
            --erp-success: #16a34a;
            --erp-warning: #f59e0b;
            --erp-danger: #dc2626;
            --erp-light: #f8fafc;
        }

        body {
            background-color: #f1f5f9;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .erp-table {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .15);
        }

        .erp-header {
            background-color: var(--erp-primary) !important;
            color: white;
        }

        .erp-table caption {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--erp-primary);
            padding: 15px;
            caption-side: top;
        }

        .erp-table tbody tr {
            transition: all .3s;
        }

        .erp-table tbody tr:hover {
            background-color: #eef4ff;
            transform: scale(1.01);
        }

        .product-id {
            font-weight: bold;
            color: var(--erp-accent);
        }

        .product-price {
            font-weight: bold;
            color: var(--erp-success);
        }

        .stock-high {
            color: var(--erp-success);
            font-weight: bold;
        }

        .stock-medium {
            color: var(--erp-warning);
            font-weight: bold;
        }

        .stock-low {
            color: var(--erp-danger);
            font-weight: bold;
        }

        .status-hot {
            color: var(--erp-danger);
            font-weight: bold;
        }

        .status-new {
            color: var(--erp-accent);
            font-weight: bold;
        }

        .status-normal {
            color: var(--erp-success);
            font-weight: bold;
        }

        @media screen and (max-width: 768px) {

            .table-rwd thead {
                display: none;
            }

            .table-rwd tbody tr {
                display: block;
                margin-top: 15px;
                border: 2px solid var(--erp-accent);
                border-radius: 10px;
                background-color: white;
                box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
            }

            .table-rwd tbody tr td {
                display: block;
                overflow: hidden;
                padding: 10px;
            }

            .table-rwd tbody tr td::before {
                content: attr(data-th) ":";
                font-size: 16px;
                font-weight: bold;
                color: var(--erp-primary);
                display: block;
                float: left;
                width: 35%;
                text-align: right;
                padding-right: 1em;
            }

            .table-rwd tbody tr td span {
                display: block;
                float: left;
                width: 65%;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <table class="table table-bordered table-hover mt-4 table-rwd erp-table">

            <caption>
                <i class="fa-solid fa-mug-hot"></i>
                手搖飲ERP商品管理系統
            </caption>

            <thead class="erp-header">
                <tr>
                    <th>產品編號</th>
                    <th>產品名稱</th>
                    <th>產品價格</th>
                    <th>產品數量</th>
                    <th>產品備註</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D001</span></td>
                    <td data-th="產品名稱"><span>珍珠奶茶</span></td>
                    <td data-th="產品價格"><span class="product-price">$65</span></td>
                    <td data-th="產品數量"><span class="stock-high">120</span></td>
                    <td data-th="產品備註"><span class="status-hot">熱銷商品</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D002</span></td>
                    <td data-th="產品名稱"><span>波霸紅茶拿鐵</span></td>
                    <td data-th="產品價格"><span class="product-price">$75</span></td>
                    <td data-th="產品數量"><span class="stock-medium">60</span></td>
                    <td data-th="產品備註"><span class="status-normal">供應中</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D003</span></td>
                    <td data-th="產品名稱"><span>四季春青茶</span></td>
                    <td data-th="產品價格"><span class="product-price">$35</span></td>
                    <td data-th="產品數量"><span class="stock-high">250</span></td>
                    <td data-th="產品備註"><span class="status-normal">供應中</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D004</span></td>
                    <td data-th="產品名稱"><span>百香綠茶</span></td>
                    <td data-th="產品價格"><span class="product-price">$50</span></td>
                    <td data-th="產品數量"><span class="stock-low">20</span></td>
                    <td data-th="產品備註"><span class="status-hot">庫存不足</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D005</span></td>
                    <td data-th="產品名稱"><span>冬瓜檸檬</span></td>
                    <td data-th="產品價格"><span class="product-price">$45</span></td>
                    <td data-th="產品數量"><span class="stock-high">150</span></td>
                    <td data-th="產品備註"><span class="status-normal">供應中</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D006</span></td>
                    <td data-th="產品名稱"><span>烏龍奶茶</span></td>
                    <td data-th="產品價格"><span class="product-price">$60</span></td>
                    <td data-th="產品數量"><span class="stock-medium">70</span></td>
                    <td data-th="產品備註"><span class="status-normal">供應中</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D007</span></td>
                    <td data-th="產品名稱"><span>多多綠茶</span></td>
                    <td data-th="產品價格"><span class="product-price">$55</span></td>
                    <td data-th="產品數量"><span class="stock-low">15</span></td>
                    <td data-th="產品備註"><span class="status-hot">即將售罄</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D008</span></td>
                    <td data-th="產品名稱"><span>芋頭鮮奶</span></td>
                    <td data-th="產品價格"><span class="product-price">$85</span></td>
                    <td data-th="產品數量"><span class="stock-medium">40</span></td>
                    <td data-th="產品備註"><span class="status-new">新品上市</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D009</span></td>
                    <td data-th="產品名稱"><span>黑糖鮮奶</span></td>
                    <td data-th="產品價格"><span class="product-price">$90</span></td>
                    <td data-th="產品數量"><span class="stock-medium">55</span></td>
                    <td data-th="產品備註"><span class="status-hot">熱銷商品</span></td>
                </tr>

                <tr>
                    <td data-th="產品編號"><span class="product-id">D010</span></td>
                    <td data-th="產品名稱"><span>蜂蜜檸檬</span></td>
                    <td data-th="產品價格"><span class="product-price">$60</span></td>
                    <td data-th="產品數量"><span class="stock-high">180</span></td>
                    <td data-th="產品備註"><span class="status-normal">供應中</span></td>
                </tr>

            </tbody>

        </table>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
